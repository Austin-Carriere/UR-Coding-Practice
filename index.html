<!doctype html>
<html lang="en-Us">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="icon" href="images/urban-rescue-logo.png" />
    <title>Urban Rescue Code Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Passero+One&display=swap"
      rel="stylesheet"
    />
    <script defer src="scripts/app.js"></script>
  </head>
  <body>
    <header class="header">
      <img
        height="70px"
        src="images/urban-rescue-logo.png"
        alt="Urban Rescue Logo"
      />
    </header>
    <div class="app">
      <div class="codespace">
        <p class="ToolBox">ToolBox</p>
        <div class="codeBank">
          <div id="codesections" class="codesections">
            <button id="MovementSectionbutton" class="codesectionbutton">
              <img alt="car icon" src="images/Car Icon (Yellow).png" />
              <br />
              Movement
            </button>
            <button id="LogicSectionbutton" class="codesectionbutton">
              <img src="images/Logic Icon (Blue).png" />
              <br />
              Logic
            </button>
            <button id="OperatorsSectionbutton" class="codesectionbutton">
              <img src="images/Operators Icon (Red).png" />
              <br />
              Operators
            </button>
            <button id="LoopsSectionbutton" class="codesectionbutton">
              <img src="images/Loops Icon (Green).png" />
              <br />
              Loops
            </button>
            <button id="SensorsSectionbutton" class="codesectionbutton">
              <img
                width="36x"
                src="images/Sensor Icon (Pink).png"
                alt="Sensor Icon"
              />
              <br />
              Sensors
            </button>
          </div>
          <div id="blockBank" class="blockBank">
            <div id="blockBankTitle">TITLE</div>
          </div>
        </div>
      </div>
      <div class="main">
        <div class="canvas">
          <p></p>
        </div>
      </div>
    </div>
  </body>
</html>
