<!doctype html>
<html lang="en-Us">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="icon" href="images/urban-rescue-logo.png" />
    <title>Urban Rescue Code Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Passero+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script defer src="scripts/app.js"></script>
  </head>
  <body>
    <header class="header">
      <img
        height="70px"
        src="images/urban-rescue-logo.png"
        alt="Urban Rescue Logo"
      />
    </header>
    <div class="app">
      <div class="codespace">
        <p class="ToolBox">ToolBox</p>
        <div class="codeBank">
          <div id="codesections" class="codesections">
            <button id="MovementSectionbutton" class="codesectionbutton">
              <img alt="car icon" src="images/Car Icon (Yellow).png" />
              <br />
              Movement
            </button>
            <button id="LogicSectionbutton" class="codesectionbutton">
              <img src="images/Logic Icon (Blue).png" />
              <br />
              Logic
            </button>
            <button id="OperatorsSectionbutton" class="codesectionbutton">
              <img src="images/Operators Icon (Red).png" />
              <br />
              Operators
            </button>
            <button id="LoopsSectionbutton" class="codesectionbutton">
              <img src="images/Loops Icon (Green).png" />
              <br />
              Loops
            </button>
            <button id="SensorsSectionbutton" class="codesectionbutton">
              <img
                width="36x"
                src="images/Sensor Icon (Pink).png"
                alt="Sensor Icon"
              />
              <br />
              Sensors
            </button>
          </div>
          <div id="blockBank" class="blockBank">
            <div id="blockBankTitle">TITLE</div>
            <div id="blockBankContent" class="blockBankContent"></div>
          </div>
        </div>
      </div>
      <div class="main">
        <div id="canvas" class="canvas">
          <p></p>
        </div>
      </div>
      <div class="sidePanel">
        <div class= "panelContainer" id = "panelContainer">
          <button class="panelButton" id="panelButton">
            <img class="arrowPopup" src="images/Arrow.svg">
          </button>
          <div class="panel">
          <canvas id = "canvas" class="canvasPopup"></canvas>
        </div>
         
      </div>
    </div>

    <template class="blockTemplate" id="blockTemplate">
      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg
          id="Base-Code-Shape"
          class="blockSvg"
          data-name="Layer 1"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 325 95.31"
        >
          <path
            d="M305,2H82.4v6.51l-23.4,13.51-23.4-13.51V2h-15.6C10.06,2,2,10.06,2,20v36c0,9.94,8.06,18,18,18h15.6v6.51l23.4,13.51,23.4-13.51v-6.51h222.6c9.94,0,18-8.06,18-18V20c0-9.94-8.06-18-18-18Z"
            fill="#fbb040"
            stroke="#ffffff"
            stroke-miterlimit="10"
            stroke-width="2"
            id="pathObject"
          />
          <foreignObject
            x="2%"
            y="20%"
            width="95%"
            height="55%"
            style="
              text-align: left;
              padding-left: 5%;
              white-space: nowrap;
              padding-top: 2px;
            "
          >
            <div id="title1" class="title">Move</div>
            <select class="blockSelectionBox" id="blockSelectionBox"></select>
            <input
              class="blockInput"
              type="number"
              min="0"
              xmlns="http://w3.org"
            />
            <div id="title2" class="title">inches</div>
            <style>
              * {
                user-select: none;
              }
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 0px;
                width: 40%;
                display: inline;
                font-size: 24px;
                color: rgb(0, 0, 0);
                font-weight: 500;
                font-family: "Elms Sans", sans-serif;
              }
              .blockSelectionBox {
                display: inline;
                field-sizing: content;
                min-height: 25px;
                border: none;
                border-radius: 5px;
                display: inline;
                font-size: 22px;
                color: rgb(0, 0, 0);
                font-weight: 500;
                font-family: "Elms Sans", sans-serif;
              }
              .blockSelectionBox:focus {
                outline: none;
              }
              .blockInput {
                min-width: 6px;
                margin: 0;
                display: inline;
                field-sizing: content;
                border: 2px solid rgb(0, 0, 0);
                border-radius: 15px;
                font-weight: 600;
                padding: 2px;
                min-height: 20px;
                min-width: 14px;
                font-size: 20px;
                font-family: "Elms Sans", sans-serif;
                text-align: center;
              }
              input::-webkit-outer-spin-button,
              input::-webkit-inner-spin-button {
                -webkit-appearance: none;
              }
              .blockInput:focus {
                box-shadow: 2px 2px 8px #181a2a89;
                outline: none;
              }

              .blockInput:out-of-range {
                box-shadow: 2px 2px 8px red;
                border-color: red;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>

    <template class="surrondBlock" id="surrondBlock">
      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg

          xmlns="http://www.w3.org/2000/svg"
          viewBox="-2 -2 327.42 197.4312"
        >
          <path

            fill="#75cbf2"
            stroke-miterlimit="10"
            stroke-width="2"
            id="pathObject"
          />
          <foreignObject
            x="7px"
            y="14px"
            width="95%"
            height="55%"
            style="
              text-align: left;
              padding-left: 5%;
              padding-top: 3%;
              white-space: nowrap;
            "
          >
            <div class="title" id="title1">Title 1</div>
            <input
              class="blockInput"
              type="number"
              min="0"
              xmlns="http://w3.org"
            />
            <div class="title" id="title2">Title2</div>
            <style>
              * {
                user-select: none;
              }
              .intacceptor {
                background: white;
                display: inline-block;
                border: 2px solid black;
                border-radius: 15px;
                height: 30px;
                width: 75px;
                margin-bottom: -9px;
                margin-left: 5px;
              }
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 0px;
                width: 40%;
                display: inline;
                font-size: 24px;
                color: rgb(0, 0, 0);
                font-weight: 500;
                font-family: "Elms Sans", sans-serif;
              }

              .blockInput {
                min-width: 6px;
                margin: auto;
                display: inline;
                field-sizing: content;
                border: 2px solid rgb(0, 0, 0);
                border-radius: 9px;
                font-family: sans-serif;
                font-weight: 600;
                padding: 2px;
                min-height: 20%;
                min-width: 14px;
                font-size: 20px;
                font-family: "Elms Sans", sans-serif;
                text-align: center;
              }
              input::-webkit-outer-spin-button,
              input::-webkit-inner-spin-button {
                -webkit-appearance: none;
              }
              .blockInput:focus {
                box-shadow: 2px 2px 8px #181a2a89;
                outline: none;
              }

              .blockInput:out-of-range {
                box-shadow: 2px 2px 8px red;
                border-color: red;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>

      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg

          xmlns="http://www.w3.org/2000/svg"
          viewBox="-2 -2 323.21 322.89"
          class="blockSvg"
        >
          <path

            fill="#75cbf2"
            stroke-width="2"
            id="pathObject"
          />
          <foreignObject width="100%" height="100%" x="25px" y="25px">
            <div class="title" id="title1">If</div>
            <div class="intacceptor" id="intacceptor"></div>
            <div class="title" id="title2">Else</div>
            <style>
              * {
                user-select: none;
              }
              .intacceptor {
                background: white;
                display: inline-block;
                border: 2px solid black;
                border-radius: 15px;
                height: 30px;
                width: 75px;
                margin-bottom: -9px;
                margin-left: 5px;
              }
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 4px;
                width: 40%;
                display: inline;
                font-size: 24px;
                color: rgb(0, 0, 0);
                font-weight: 500;
                font-family: "Elms Sans", sans-serif;
              }

              #title2 {
                display: block;
                transform: translate(0px, 94px);
              }

              .blockInput {
                min-width: 6px;
                margin: auto;
                display: inline;
                field-sizing: content;
                border: 2px solid rgb(0, 0, 0);
                border-radius: 9px;
                font-family: sans-serif;
                font-weight: 600;
                padding: 2px;
                min-height: 20%;
                min-width: 14px;
                font-size: 20px;
                font-family: "Elms Sans", sans-serif;
                text-align: center;
              }
              input::-webkit-outer-spin-button,
              input::-webkit-inner-spin-button {

              }
              .blockInput:focus {

                outline: none;
              }

              .blockInput:out-of-range {
                box-shadow: 2px 2px 8px red;
                border-color: red;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>

    <template class="startBlock" id="startBlock">
      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg
          id="Base-Code-Shape"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="-2 -2 325.84 108.65"
          class="blockSvg"
        >
          <path
            d="M223.84,0H50C22.39,0,0,22.39,0,50v21.48c0,6.63,5.37,12,12,12h21.71l.03,6.63,23.71,13.55,23.58-13.76-.03-6.42h180.84c6.63,0,12-5.37,12-12v-21.48c0-27.61-22.39-50-50-50Z"
            fill="#fbb040"
            stroke-width="2"
            id="pathObject"
          />
          <foreignObject height="40%" width="100%" x="20" y="25px">
            <div class="title">On play</div>
            <style>
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 0px;
                width: 40%;
                display: inline;
                font-size: 28px;
                color: rgb(0, 0, 0);
                font-weight: 550;
                font-family: "Elms Sans", sans-serif;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>

    <template class="intBlock" id="intBlock">
      <div class="block">

            stroke-width="2"/>

      /
    </div>
    <input type = "number" class = "blockInput" id = "input1">

    }
   .blockInput {
                min-width: 6px;

                padding: 2px;

              }

  </body>
</html>
