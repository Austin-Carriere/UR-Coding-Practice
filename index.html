<!doctype html>
<html lang="en-Us">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="icon" href="images/urban-rescue-logo.png" />
    <title>Urban Rescue Code Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Passero+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script defer src="scripts/app.js"></script>
  </head>
  <body>
    <header class="header">
      <img
        height="70px"
        src="images/urban-rescue-logo.png"
        alt="Urban Rescue Logo"
      />
    </header>
    <div class="app">
      <div class="codespace">
        <p class="ToolBox">ToolBox</p>
        <div class="codeBank">
          <div id="codesections" class="codesections">
            <button id="MovementSectionbutton" class="codesectionbutton">
              <img alt="car icon" src="images/Car Icon (Yellow).png" />
              <br />
              Movement
            </button>
            <button id="LogicSectionbutton" class="codesectionbutton">
              <img src="images/Logic Icon (Blue).png" />
              <br />
              Logic
            </button>
            <button id="OperatorsSectionbutton" class="codesectionbutton">
              <img src="images/Operators Icon (Red).png" />
              <br />
              Operators
            </button>
            <button id="LoopsSectionbutton" class="codesectionbutton">
              <img src="images/Loops Icon (Green).png" />
              <br />
              Loops
            </button>
            <button id="SensorsSectionbutton" class="codesectionbutton">
              <img
                width="36x"
                src="images/Sensor Icon (Pink).png"
                alt="Sensor Icon"
              />
              <br />
              Sensors
            </button>
          </div>
          <div id="blockBank" class="blockBank">
            <div id="blockBankTitle">TITLE</div>
            <div id="blockBankContent" class="blockBankContent"></div>
          </div>
        </div>
      </div>
      <div class="main">
        <div id="canvas" class="canvas">
          <p></p>
        </div>
      </div>
    </div>

    <template class="blockTemplate" id="blockTemplate">
      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg
          id="Base-Code-Shape"
          class="blockSvg"
          data-name="Layer 1"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 325 95.31"
        >
          <path
            d="M305,2H82.4v6.51l-23.4,13.51-23.4-13.51V2h-15.6C10.06,2,2,10.06,2,20v36c0,9.94,8.06,18,18,18h15.6v6.51l23.4,13.51,23.4-13.51v-6.51h222.6c9.94,0,18-8.06,18-18V20c0-9.94-8.06-18-18-18Z"
            fill="#fbb040"
            stroke="#fbb040"
            stroke-miterlimit="10"
            stroke-width="4"
            id="pathObject"
          />
          <foreignObject
            x="2%"
            y="20%"
            width="95%"
            height="55%"
            style="text-align: left; padding-left: 5%"
          >
            <div id="title1" class="title">Move</div>
            <select class="blockSelectionBox" id="blockSelectionBox"></select>
            <input
              class="blockInput"
              type="number"
              min="0"
              xmlns="http://w3.org"
            />
            <div id="title2" class="title">inches</div>
            <style>
              * {
                user-select: none;
              }
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 0px;
                width: 40%;
                display: inline;
                font-size: 24px;
                color: rgb(0, 0, 0);
                font-weight: 500;
              }
              .blockSelectionBox {
                display: inline;
                field-sizing: content;
                min-height: 25px;
                border: none;
                border-radius: 5px;
                display: inline;
                font-size: 22px;
                color: rgb(0, 0, 0);
                font-weight: 500;
              }
              .blockSelectionBox:focus {
                outline: none;
              }
              .blockInput {
                min-width: 6px;
                margin: auto;
                display: inline;
                field-sizing: content;
                border: 2px solid rgb(0, 0, 0);
                border-radius: 9px;
                font-family: sans-serif;
                font-weight: 600;
                padding: 2px;
                min-height: 20%;
                min-width: 14px;
                font-size: 20px;
              }
              input::-webkit-outer-spin-button,
              input::-webkit-inner-spin-button {
                -webkit-appearance: none;
              }
              .blockInput:focus {
                box-shadow: 2px 2px 8px #181a2a89;
                outline: none;
              }

              .blockInput:out-of-range {
                box-shadow: 2px 2px 8px red;
                border-color: red;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>

    <template class="surrondBlock" id="surrondBlock">
      <div class="block">
        <?xml version="1.0" encoding="UTF-8"?>
        <svg
          id="Base-Code-Shape"
          class="blockSvg"
          data-name="Layer 1"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="-2 -2 327.42 197.4312"
        >
          <path
            d="M302.65,0H80.64l.06,7.11-23.26,13.68-23.48-13.3-.06-7.48h-15.55C8.21,0,0,8.21,0,18.35v135.06c0,11.05,8.95,20,20,20h14.01l.06,6.84,23.48,13.3,23.26-13.68-.05-6.47h232.36v-30.52h-155.46v7.64l-23.37,13.49-23.37-13.49v-7.64h-47.98l-5.72-3.24v-67.65h53.75l.05,6.48,23.48,13.3,23.26-13.68-.05-6.1h144.94c10.13,0,18.35-8.21,18.35-18.35V18.35c0-10.13-8.21-18.35-18.35-18.35Z"
            fill="#75cbf2"
            stroke="#75cbf2"
            stroke-miterlimit="10"
            stroke-width="4"
            id="pathObject"
          />
          <foreignObject
            x="2%"
            y="8%"
            width="95%"
            height="55%"
            style="text-align: left; padding-left: 5%; padding-top: 2%"
          >
            <div class="title" id="title1">Title 1</div>
            <div class="intacceptor" id="intacceptor"></div>
            <input
              class="blockInput"
              type="number"
              min="0"
              xmlns="http://w3.org"
            />
            <div class="title" id="title2">Title2</div>
            <style>
              * {
                user-select: none;
              }
              .intacceptor {
                background: white;
                display: inline-block;
                border: 2px solid black;
                border-radius: 15px;
                height: 30px;
                width: 75px;
                margin-bottom: -9px;
                margin-left: 5px;
              }
              .title {
                display: inline;
                margin: 3px 0px;
                padding: 3px 0px;
                width: 40%;
                display: inline;
                font-size: 24px;
                color: rgb(0, 0, 0);
                font-weight: 500;
              }

              .blockInput {
                min-width: 6px;
                margin: auto;
                display: inline;
                field-sizing: content;
                border: 2px solid rgb(0, 0, 0);
                border-radius: 9px;
                font-family: sans-serif;
                font-weight: 600;
                padding: 2px;
                min-height: 20%;
                min-width: 14px;
                font-size: 20px;
              }
              input::-webkit-outer-spin-button,
              input::-webkit-inner-spin-button {
                -webkit-appearance: none;
              }
              .blockInput:focus {
                box-shadow: 2px 2px 8px #181a2a89;
                outline: none;
              }

              .blockInput:out-of-range {
                box-shadow: 2px 2px 8px red;
                border-color: red;
              }
            </style>
          </foreignObject>
        </svg>
      </div>
    </template>
  </body>
</html>
